<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch Menu Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feeling hungry?</h1>
        <p>Get a random lunch menu recommendation!</p>
        <div id="menu-display"></div>
        <button id="recommend-button">Get Recommendation</button>
    </div>

    <div class="container inquiry-container">
        <h2>제휴 문의</h2>
        <p>함께하고 싶으신가요? 메시지를 남겨주세요.</p>
        <form action="https://formspree.io/f/xojpprpo" method="POST" id="inquiry-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="성함/업체명" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="이메일 주소" required>
            </div>
            <div class="form-group">
                <input type="text" name="subject" placeholder="문의 제목" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="문의 내용" rows="4" required></textarea>
            </div>
            <button type="submit" class="submit-button">문의하기</button>
        </form>
    </div>

    <div class="container comment-container">
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://kkongsky.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="main.js"></script>
</body>
</html>
